<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>永思花系列｜紙語紙境</title>
    <meta name="description" content="適合告別、追思、祭拜與紀念場合，溫柔不張揚，讓思念被安放得更妥貼。" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="wrap nav">
        <a class="brand" href="./index.html#home" aria-label="紙語紙境首頁"><span class="mark">紙</span><span>紙語紙境</span></a>
        <nav class="links" aria-label="主要導覽">
          <a href="./index.html#home">首頁</a>
          <a href="./index.html#about">品牌介紹</a>
          <a href="./index.html#products">商品展示</a>
          <a href="./index.html#contact">聯絡方式</a>
          <button class="cart-button" type="button" data-cart-open aria-label="開啟購物車">購物車 <span data-cart-count>0</span></button>
        </nav>
      </div>
    </header>
    <main>
      <section class="wrap series-hero-page">
        <a class="back-link" href="./index.html#products">← 回商品展示</a>
        <div class="series-page-heading">
          <p class="eyebrow">Memorial Flower</p>
          <h1>永思花系列</h1>
          <p>適合告別、追思、祭拜與紀念場合，溫柔不張揚，讓思念被安放得更妥貼。</p>
          <div class="actions"><button class="btn primary" type="button" data-add-cart data-name="永思花">加入購物車</button><button class="btn secondary" type="button" data-cart-open>查看購物車</button></div>
        </div>
      </section>
      <section class="wrap section series-gallery-section">
        <div class="heading"><h2>作品照片</h2><p class="section-note">可新增永思花實拍照片，讓客人直接在本頁瀏覽。</p></div>
        <div class="gallery-grid">
          <figure class="gallery-card"><img src="./assets/memorial-flower.svg" alt="永思花作品示意" /><figcaption>永思花作品示意</figcaption></figure><div class="empty-photo">永思花實拍照片可再新增</div>
        </div>
      </section>
    </main>
    <aside class="cart-drawer" data-cart-drawer aria-hidden="true" aria-label="購物車"><div class="cart-panel"><div class="cart-head"><div><p class="eyebrow">Cart</p><h2>購物車</h2></div><button class="icon-btn" type="button" data-cart-close aria-label="關閉購物車">×</button></div><div class="cart-items" data-cart-items></div><form class="order-form" data-order-form><label>姓名<input name="name" type="text" placeholder="請輸入姓名" required /></label><label>電話<input name="phone" type="tel" placeholder="請輸入聯絡電話" required /></label><label>需求日期<input name="date" type="date" /></label><label>備註<textarea name="note" rows="4" placeholder="用途、地點、預算、想要的色系或尺寸"></textarea></label><button class="btn primary" type="submit">產生訂單內容</button></form><div class="order-output" data-order-output hidden><strong>訂單內容</strong><textarea data-order-text rows="8" readonly></textarea><button class="btn secondary" type="button" data-copy-order>複製訂單內容</button></div></div></aside>
    <footer class="site-footer simple-footer"><div class="wrap copyright-line">© 2026 紙語紙境版權所有｜網站內容、圖片與文案未經授權請勿轉載、使用或仿製</div></footer>
    <script src="./script.js"></script>
  </body>
</html>
